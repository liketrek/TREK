  <!-- Origin dot -->
  <circle cx="4.5" cy="23" r="3.2" fill="#09090b"/>
  <!-- Destination pin -->
  <path d="M22,4 C19,4 16.5,6.5 16.5,9.5 C16.5,14 22,19 22,19 C22,19 27.5,14 27.5,9.5 C27.5,6.5 25,4 22,4 Z"
