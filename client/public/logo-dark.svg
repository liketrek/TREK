  <text y="20" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif" fill="#09090b">
    <tspan x="36" font-size="20" font-weight="800" letter-spacing="-0.4">Trek</tspan><tspan font-size="20" font-weight="300" letter-spacing="0.1"> Wanderer</tspan>
